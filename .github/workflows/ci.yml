name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr ghostscript python3-tk

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install ocrmypdf pytesseract Pillow pymupdf

      - name: Check non-tk imports
        run: python -c "import ocrmypdf, pytesseract, PIL, pymupdf, json, os, re, subprocess, threading, pathlib, urllib.request; print('Core imports OK')"

      - name: Check tkinter import (optional on runners)
        run: python -c "import tkinter, tkinter.ttk; print('tkinter OK')" || echo "tkinter not available (standalone build)"

      - name: Check Python syntax
        run: |
          python -m py_compile ArkIndex.py
          echo "Python syntax OK"

      - name: Check install scripts
        run: |
          bash -n install_linux.sh && echo "  linux OK"
          bash -n install_macos.sh && echo "  macos OK"
          bash -n install_windows.bat 2>/dev/null && echo "  windows OK" || echo "  skipping windows .bat check"
