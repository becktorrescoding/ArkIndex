name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr ghostscript python3-tk

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install ocrmypdf pytesseract Pillow pymupdf

      - name: Check imports
        run: |
          python -c "
import sys
modules = ['ocrmypdf', 'pytesseract', 'PIL', 'pymupdf',
           'json', 'os', 're', 'subprocess', 'threading', 'pathlib',
           'urllib.request']
errors = []
for m in modules:
    try:
        __import__(m)
    except ImportError as e:
        errors.append(f'  {m}: {e}')
# tkinter may not be available in standalone Python builds on runners
try:
    import tkinter
    import tkinter.ttk
except ImportError:
    print('  tkinter: not available (standalone build)')

if errors:
    print('Import errors:')
    for e in errors:
        print(e)
    sys.exit(1)
print('All imports OK')
"

      - name: Check Python syntax
        run: |
          python -m py_compile ArkIndex.py
          echo "Python syntax OK"

      - name: Check install scripts
        run: |
          bash -n install_linux.sh && echo "  linux OK"
          bash -n install_macos.sh && echo "  macos OK"
          bash -n install_windows.bat 2>/dev/null; echo "  skipping windows .bat check"
